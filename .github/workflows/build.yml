name: Build

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - 'v*'

jobs:
  build:

    runs-on: windows-latest

    env:
      PYTHONIOENCODING: 'UTF-8'

    strategy:
      matrix:
        python-version: [ 3.12 ]

    permissions:
      actions: write
      contents: write

    steps:
      - name: Configure git
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          git config --global core.autocrlf false
          git config --global core.eol lf
          git config --global user.email "110257560+BnanZ0@users.noreply.github.com"
          git config --global user.name "RU"
          echo "action_state=yellow" >> $env:GITHUB_ENV
          echo "${{ env.action_state }}"

      - uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set UTF-8 encoding
        run: |
          set PYTHONIOENCODING=utf-8
          set PYTHONLEGACYWINDOWSSTDIO=utf-8
          echo PYTHONIOENCODING=utf-8 >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: inline_ok_requirements #жҠҠok-scriptеҠ е…Ҙжәҗз Ғ, д»Һrequirements.txtдёӯеҲ йҷӨд»ҘжҸҗй«ҳеҚҮзә§жӣҙж–°йҖҹеәҰ
        run: |
          python -m ok.update.inline_ok_requirements --tag ${{ github.ref_name }}

      - name: Run tests
        run: |
          Get-ChildItem -Path ".\tests\*.py" | ForEach-Object {
              Write-Host "Running tests in $($_.FullName)"
              python -m unittest $_.FullName
          }

      - name: Sync Repositories # еҗҢжӯҘйғЁеҲҶд»Јз Ғ(deploy.txtдёӯ), еҗҲе№¶tagдёӯй—ҙжӣҙж–°ж—Ҙеҝ—, еҲ°жӣҙж–°еә“, д»ҘеҮҸе°‘з”ЁжҲ·жӣҙж–°дҪҝз”Ёзҡ„gitеә“еӨ§е°Ҹ
        id: sync   # Give the step an ID to access its outputs
        uses: ok-oldking/partial-sync-repo@bbd55c1dffbcc1292a12295d949e7807b35ea93e # Replace with your action path
        with:
          repos: |
            https://cnb:${{ secrets.CNB_GH }}@cnb.cool/BnanZ0/ok-nte-update.git
            https://BnanZ0:${{ secrets.OK_GH }}@github.com/BnanZ0/ok-nte-update.git
          sync_list: 'deploy.txt'
          tag: ${{ github.ref_name }}
          gitignore_file: '.update_repo_gitignore'
          show_author: true #еңЁжӣҙж–°ж—Ҙеҝ—дёӯеҠ е…ҘдҪңиҖ…

      - name: Build with PyAppify Action
        id: build-app
        uses: ok-oldking/pyappify-action@master #дҪҝз”Ёpyappifyжү“еҢ…exe
        with:
          build_exe_only: false
          # дҪҝз”ЁдёҠдёҖдёӘзЁіе®ҡзүҲжң¬зҡ„ Release жқҘиҺ·еҸ–е·Іжү“еҢ…зҡ„еҗҜеҠЁеҷЁпјҢд»ҺиҖҢи·іиҝҮиҖ—ж—¶зҡ„жү“еҢ…иҝҮзЁӢ
          use_release: https://api.github.com/repos/BnanZ0/ok-nte/releases/tags/v0.0.21

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: |
            ###  жӣҙж–°ж—Ҙеҝ— ${{ steps.sync.outputs.start_tag }} -> ${{ steps.sync.outputs.end_tag }}:
              ${{ steps.sync.outputs.changes_with_asterisk }}
            ### дёӢиҪҪеҢ…иҜҙжҳҺ
              * [ok-nte-win32-China-setup.exe](https://github.com/BnanZ0/ok-nte/releases/download/${{ github.ref_name }}/ok-nte-win32-China-setup.exe) е®Ңж•ҙе®үиЈ…еҢ…, жӣҙж–°дҪҝз”ЁйҳҝйҮҢдә‘+и…ҫи®ҜCNB.
              * [ok-nte-win32-online-setup.exe](https://github.com/BnanZ0/ok-nte/releases/download/${{ github.ref_name }}/ok-nte-win32-online-setup.exe) еңЁзәҝе®үиЈ…еҢ…, еңЁзәҝзҷҪе«–зҡ„жңҚеҠЎеҷЁдёҚдёҖе®ҡзЁіе®ҡ, е»әи®®дјҳе…ҲдҪҝз”Ёе®Ңж•ҙеҢ…. 
              * [ok-nte-win32-Global-setup.exe](https://github.com/BnanZ0/ok-nte/releases/download/${{ github.ref_name }}/ok-nte-win32-Global-setup.exe) full package with dependencies, using GitHub and PyPi as update source 
              * дёҚиҰҒдёӢиҪҪok-nte-win32.zip,е’ҢSourceCode.zip, Do Not Download the SourceCode, ok-nte-win32.zip            
            ### еҰӮжһңж— жі•дёӢиҪҪжҲ–дёӢиҪҪж…ў, еҸҜд»ҘдҪҝз”Ёе…¶д»–дёӢиҪҪжәҗ
              * [Mirrorй…ұдёӢиҪҪжё йҒ“](https://mirrorchyan.com/zh/projects?rid=ok-nte&channel=stable), еӣҪеҶ…зҪ‘йЎөзӣҙй“ҫ, дёӢиҪҪйңҖиҰҒиҙӯд№°CD-KEY, е·ІжңүMirrorй…ұCD-KEYеҸҜе…Қиҙ№дёӢиҪҪ
              * [еӨёе…ӢзҪ‘зӣҳ](https://pan.quark.cn/s/db2517830901) е…Қиҙ№, йңҖжіЁеҶҢиҙҰеҸ·
          draft: false
          prerelease: false
          make_latest: true
          files: pyappify_dist/*

      - name: Trigger MirrorChyanUploading
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release.yml -f tag=${{ github.ref_name }}
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note.yml -f tag=${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
